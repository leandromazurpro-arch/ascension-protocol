<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Serments du Jour</title>
<meta name="theme-color" content="#0c0808"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<link rel="manifest" href="manifest.json"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
:root {
  --bg:       #0c0808;
  --surface:  #130d0d;
  --surface2: #1b1212;
  --border:   #2d1818;
  --border2:  #3d2222;
  --red:      #7a1818;
  --red2:     #8f1e1e;
  --gold:     #b8923a;
  --gold2:    #c9a84c;
  --gold-bg:  rgba(184,146,58,.08);
  --text:     #ede8df;
  --soft:     #a89e94;
  --muted:    #6a5c55;
  --green:    #4a8a40;
  --green-bg: rgba(42,74,37,.25);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{
  background:var(--bg);
  color:var(--text);
  font-family:'Inter',-apple-system,sans-serif;
  font-size:14px;
  line-height:1.55;
  min-height:100vh;
  padding-bottom:64px;
}

/* ── HEADER ── */
.hdr{
  padding:26px 20px 16px;
  text-align:center;
  border-bottom:1px solid var(--border);
  background:var(--bg);
  position:sticky;top:0;z-index:100;
}
.hdr-title{
  font-family:'Cormorant Garamond',Georgia,serif;
  font-size:26px;font-weight:700;
  letter-spacing:5px;text-transform:uppercase;
  color:var(--text);margin-bottom:10px;
}
.hdr-meta{
  display:flex;justify-content:center;align-items:center;
  gap:14px;flex-wrap:wrap;
}
.rank-pill{
  font-size:11px;font-weight:500;letter-spacing:1px;
  padding:2px 10px;border-radius:20px;
  border:1px solid var(--gold);color:var(--gold);
}
.hdr-xp{ font-size:12px;color:var(--soft); }
.streak{
  font-size:12px;color:var(--gold2);
  display:flex;align-items:center;gap:3px;
}
.day-badge{
  margin-top:10px;font-size:11px;letter-spacing:1.5px;
  text-transform:uppercase;color:var(--muted);
  font-family:'Inter',sans-serif;
}
.day-badge.complete{color:var(--green);}
.day-badge.saved{color:var(--gold);}
.day-badge.failed{color:#7a3030;}

/* ── MAIN ── */
.main{max-width:500px;margin:0 auto;padding:18px 14px;}

/* ── DOMAIN CARD ── */
.card{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:8px;
  padding:18px 18px 16px;
  margin-bottom:12px;
  transition:border-color .4s;
}
.card.v-reussi{ border-color:rgba(74,138,64,.45); }
.card.v-minimum{ border-color:rgba(184,146,58,.35); }
.card.v-rate{ border-color:rgba(122,24,24,.3); opacity:.72; }

.card-top{
  display:flex;justify-content:space-between;
  align-items:flex-start;margin-bottom:2px;
}
.domain-name{
  font-family:'Cormorant Garamond',Georgia,serif;
  font-size:20px;font-weight:600;letter-spacing:.5px;
}
.lvl-badge{
  font-size:10px;font-weight:500;letter-spacing:.5px;
  padding:2px 8px;border-radius:12px;
  border:1px solid rgba(184,146,58,.4);color:var(--gold);
  white-space:nowrap;margin-top:2px;
}
.domain-sub{
  font-size:10px;letter-spacing:1px;
  text-transform:uppercase;color:var(--muted);
  margin-bottom:12px;
}

/* PROGRESSION DOTS */
.prog-row{
  display:flex;align-items:center;gap:8px;
  margin-bottom:14px;
}
.dots{display:flex;gap:5px;}
.dot{
  width:9px;height:9px;border-radius:50%;
  border:1px solid var(--gold);
  transition:background .3s;
}
.dot.on{ background:var(--gold); }
.prog-txt{font-size:11px;color:var(--muted);}

/* DIVIDER */
.sep{height:1px;background:var(--border);margin:12px 0;}

/* MISSION LINE */
.mission-line{
  font-family:'Cormorant Garamond',Georgia,serif;
  font-size:16px;font-style:italic;
  color:var(--soft);margin-bottom:12px;
}

/* CHECKLIST */
.checklist{list-style:none;margin-bottom:12px;}
.cli{
  display:flex;align-items:center;gap:10px;
  padding:7px 8px;border-radius:5px;
  cursor:pointer;transition:background .15s;
  margin-bottom:2px;
}
.cli:hover{background:var(--surface2);}
.cli.chk{ opacity:.5; }
.cli.chk .cli-lbl{ text-decoration:line-through; }
.cli-box{
  width:17px;height:17px;flex-shrink:0;border-radius:3px;
  border:1px solid var(--border2);
  display:flex;align-items:center;justify-content:center;
  font-size:10px;transition:all .15s;
}
.cli.chk .cli-box{ background:var(--red);border-color:var(--red);color:var(--text); }
.cli-lbl{font-size:13px;color:var(--soft);user-select:none;}

/* ACTION BUTTONS */
.actions{
  display:grid;grid-template-columns:1fr 1fr 1fr;
  gap:7px;margin-top:12px;
}
.btn{
  padding:9px 4px;border-radius:5px;border:none;
  font-size:12px;font-weight:500;letter-spacing:.3px;
  cursor:pointer;transition:all .2s;
  font-family:'Inter',sans-serif;
}
.btn:active{transform:scale(.97);}
.btn-r{ background:var(--red);color:var(--text);border:1px solid var(--red); }
.btn-r:hover{ background:var(--red2);border-color:var(--red2); }
.btn-m{ background:transparent;color:var(--gold);border:1px solid rgba(184,146,58,.4); }
.btn-m:hover{ border-color:var(--gold);background:var(--gold-bg); }
.btn-x{ background:transparent;color:var(--muted);border:1px solid var(--border2); }
.btn-x:hover{ border-color:#5a2a2a;color:#8a5050; }

/* VALIDATED */
.v-box{
  padding:12px;border-radius:5px;
  text-align:center;font-size:13px;
  margin-top:4px;
}
.v-box.reussi{ background:var(--green-bg);color:var(--green);border:1px solid rgba(74,138,64,.25); }
.v-box.minimum{ background:var(--gold-bg);color:var(--gold2);border:1px solid rgba(184,146,58,.2); }
.v-box.rate{ background:rgba(90,18,18,.2);color:#8a4444;border:1px solid rgba(122,24,24,.2); }

/* INPUTS */
.fg{ margin-bottom:10px; }
.flbl{
  display:block;font-size:10px;letter-spacing:.8px;
  text-transform:uppercase;color:var(--muted);margin-bottom:4px;
}
.finput{
  width:100%;background:var(--surface2);
  border:1px solid var(--border2);border-radius:5px;
  padding:8px 10px;color:var(--text);font-size:13px;
  font-family:'Inter',sans-serif;transition:border-color .2s;
}
.finput:focus{ outline:none;border-color:rgba(184,146,58,.5); }
.frow{display:grid;grid-template-columns:1fr 1fr;gap:8px;}

/* BOOK BAR */
.bk-bar{height:3px;background:var(--surface2);border-radius:2px;margin-top:6px;overflow:hidden;}
.bk-fill{height:100%;background:var(--gold);border-radius:2px;transition:width .5s;}
.bk-txt{font-size:10px;color:var(--muted);margin-top:3px;text-align:right;}

/* SETTINGS */
.settings-toggle{
  text-align:center;margin-top:20px;
}
.stg-btn{
  background:none;border:none;color:var(--muted);
  font-size:11px;letter-spacing:1.5px;text-transform:uppercase;
  cursor:pointer;padding:8px 16px;transition:color .2s;
  font-family:'Inter',sans-serif;
}
.stg-btn:hover{color:var(--soft);}
.stg-panel{
  display:none;background:var(--surface);
  border:1px solid var(--border);border-radius:8px;
  padding:18px;margin-top:8px;
}
.stg-panel.open{display:block;}
.stg-title{
  font-family:'Cormorant Garamond',Georgia,serif;
  font-size:17px;color:var(--soft);
  margin-bottom:16px;letter-spacing:1px;
}
.stg-sec{margin-bottom:14px;}
.stg-sec-t{
  font-size:9px;text-transform:uppercase;letter-spacing:1.5px;
  color:var(--muted);margin-bottom:9px;
  padding-bottom:5px;border-bottom:1px solid var(--border);
}
.btn-save{
  background:var(--red);color:var(--text);
  border:1px solid var(--red);padding:9px 16px;
  border-radius:5px;font-size:12px;cursor:pointer;
  font-family:'Inter',sans-serif;transition:background .2s;
}
.btn-save:hover{background:var(--red2);}
.btn-ghost{
  background:transparent;border:1px solid var(--border2);
  color:var(--muted);padding:9px 16px;border-radius:5px;
  font-size:12px;cursor:pointer;font-family:'Inter',sans-serif;
  margin-left:8px;
}

/* LEVEL UP ANIM */
@keyframes lvlUp{
  0%{box-shadow:0 0 0 0 rgba(184,146,58,.4);}
  40%{box-shadow:0 0 0 8px rgba(184,146,58,.1);}
  100%{box-shadow:none;}
}
.lv-anim{animation:lvlUp 1.4s ease forwards;}

/* TOAST */
.toasts{
  position:fixed;top:76px;right:12px;
  z-index:999;display:flex;flex-direction:column;gap:6px;
}
.toast{
  background:var(--surface2);border:1px solid var(--border2);
  border-radius:6px;padding:9px 13px;font-size:12px;
  color:var(--soft);max-width:210px;
  animation:tIn .28s ease, tOut .28s ease 2.8s forwards;
}
.toast.gold{border-color:rgba(184,146,58,.5);color:var(--gold2);}
.toast.ok{border-color:rgba(74,138,64,.4);color:var(--green);}
@keyframes tIn{from{transform:translateX(110%);opacity:0}to{transform:translateX(0);opacity:1}}
@keyframes tOut{from{opacity:1}to{opacity:0;transform:translateY(-5px)}}
</style>
</head>
<body>

<div class="toasts" id="toasts"></div>

<!-- HEADER -->
<div class="hdr">
  <div class="hdr-title">Serments du Jour</div>
  <div class="hdr-meta">
    <div class="rank-pill" id="hRank">E-Rank</div>
    <div class="hdr-xp" id="hXP">0 XP</div>
    <div class="streak">🔥 <span id="hStreak">0</span></div>
  </div>
  <div class="day-badge" id="hDay">En cours</div>
</div>

<div class="main">

  <!-- NUTRITION -->
  <div class="card" id="card-nutrition">
    <div class="card-top">
      <div class="domain-name">Nutrition</div>
      <div class="lvl-badge" id="lv-nutrition">Niveau 1</div>
    </div>
    <div class="domain-sub" id="sb-nutrition">Structure</div>
    <div class="prog-row">
      <div class="dots" id="dots-nutrition"></div>
      <div class="prog-txt" id="pt-nutrition">0 / 3</div>
    </div>
    <div id="bd-nutrition"></div>
  </div>

  <!-- LECTURE -->
  <div class="card" id="card-lecture">
    <div class="card-top">
      <div class="domain-name">Lecture</div>
      <div class="lvl-badge" id="lv-lecture">Niveau 1</div>
    </div>
    <div class="domain-sub" id="sb-lecture">Contact quotidien</div>
    <div class="prog-row">
      <div class="dots" id="dots-lecture"></div>
      <div class="prog-txt" id="pt-lecture">0 / 3</div>
    </div>
    <div id="bd-lecture"></div>
  </div>

  <!-- SPORT -->
  <div class="card" id="card-sport">
    <div class="card-top">
      <div class="domain-name">Sport</div>
      <div class="lvl-badge" id="lv-sport">Niveau 1</div>
    </div>
    <div class="domain-sub" id="sb-sport">Routine fixe</div>
    <div class="prog-row">
      <div class="dots" id="dots-sport"></div>
      <div class="prog-txt" id="pt-sport">0 / 3</div>
    </div>
    <div id="bd-sport"></div>
  </div>

  <!-- DEVOIRS -->
  <div class="card" id="card-devoirs">
    <div class="card-top">
      <div class="domain-name">Devoirs</div>
      <div class="lvl-badge" id="lv-devoirs">Niveau 1</div>
    </div>
    <div class="domain-sub" id="sb-devoirs">Exécution</div>
    <div class="prog-row">
      <div class="dots" id="dots-devoirs"></div>
      <div class="prog-txt" id="pt-devoirs">0 / 3</div>
    </div>
    <div id="bd-devoirs"></div>
  </div>

  <!-- SETTINGS -->
  <div class="settings-toggle">
    <button class="stg-btn" onclick="toggleStg()">⚙ Paramètres</button>
  </div>
  <div class="stg-panel" id="stgPanel">
    <div class="stg-title">Paramètres</div>

    <div class="stg-sec">
      <div class="stg-sec-t">Lecture</div>
      <div class="fg">
        <label class="flbl">Nom du livre</label>
        <input class="finput" id="s-book" placeholder="Titre du livre actuel"/>
      </div>
      <div class="frow">
        <div class="fg">
          <label class="flbl">Page actuelle</label>
          <input class="finput" id="s-page" type="number" min="0" placeholder="0"/>
        </div>
        <div class="fg">
          <label class="flbl">Total pages</label>
          <input class="finput" id="s-total" type="number" min="1" placeholder="..."/>
        </div>
      </div>
    </div>

    <div class="stg-sec">
      <div class="stg-sec-t">Nutrition — horaires</div>
      <div class="frow">
        <div class="fg">
          <label class="flbl">Heure snack</label>
          <input class="finput" id="s-snack" type="time" value="09:00"/>
        </div>
        <div class="fg">
          <label class="flbl">Repas du soir</label>
          <input class="finput" id="s-dinner" type="time" value="18:45"/>
        </div>
      </div>
    </div>

    <div class="stg-sec">
      <div class="stg-sec-t">Devoirs</div>
      <div class="fg">
        <label class="flbl">Devoir du jour</label>
        <input class="finput" id="s-devoir" placeholder="Nom du devoir"/>
      </div>
    </div>

    <button class="btn-save" onclick="saveStg()">Enregistrer</button>

    <div style="margin-top:14px;padding-top:12px;border-top:1px solid var(--border);">
      <div class="stg-sec-t" style="margin-bottom:8px;">Données</div>
      <button class="btn-save" onclick="exportData()">Exporter</button>
      <button class="btn-ghost" onclick="document.getElementById('impFile').click()">Importer</button>
      <input type="file" id="impFile" accept=".json" style="display:none;" onchange="handleImport(event)"/>
    </div>
  </div>

</div>

<script>
// ════════════════════════════════
//  DONNÉES DE RÉFÉRENCE
// ════════════════════════════════

const RANKS=[
  {n:'E-Rank',min:0},   {n:'D-Rank',min:200},
  {n:'C-Rank',min:500}, {n:'B-Rank',min:1000},
  {n:'A-Rank',min:2000},{n:'S-Rank',min:4000},
];

const NUT_LVL=[null,
  {n:'Structure',    d:'Respecter les 4 moments de nourriture.'},
  {n:'Protéines',    d:'Ajouter une source de protéine à 2 repas.'},
  {n:'Protéines +',  d:'Ajouter une source de protéine à 3 repas.'},
  {n:'Snack évolué', d:'Améliorer la qualité du snack du matin.'},
  {n:'Anticipation', d:'Préparer au moins 1 repas à l\'avance.'},
];

const LEC_LVL=[null,
  {n:'Contact quotidien',p:5, note:false,sum:false},
  {n:'Régularité',       p:7, note:false,sum:false},
  {n:'Profondeur',       p:10,note:false,sum:false},
  {n:'Cadence',          p:12,note:false,sum:false},
  {n:'Immersion',        p:15,note:false,sum:false},
  {n:'Concentration',    p:20,note:false,sum:false},
  {n:'Analyse I',        p:20,note:true, sum:false},
  {n:'Analyse II',       p:25,note:true, sum:false},
  {n:'Maîtrise',         p:30,note:false,sum:false},
  {n:'Éloquence',        p:30,note:false,sum:true},
];

const DEV_LVL=[null,
  {n:'Exécution',  d:'Terminer 1 devoir aujourd\'hui.'},
  {n:'Rigueur',    d:'Terminer 1 devoir et le relire.'},
  {n:'Discipline', d:'Terminer 1 devoir avant une heure fixe.'},
  {n:'Efficacité', d:'Terminer 2 devoirs.'},
  {n:'Excellence', d:'Terminer 2 devoirs et les relire.'},
  {n:'Maîtrise',   d:'Terminer 2 devoirs avant une heure fixe.'},
  {n:'Perfection', d:'Terminer tous les devoirs du jour.'},
  {n:'Anticipation',d:'Tous les devoirs + préparer ceux de demain.'},
];

// Sport config par niveau
function sportCfg(lv){
  const L=Math.min(lv,8);
  return [null,
    {fs:2,os:2,rp:10,g:{s:2,t:30},mol:{s:2,r:20},cr:{s:2,r:20}},
    {fs:3,os:2,rp:10,g:{s:2,t:40},mol:{s:3,r:20},cr:{s:3,r:20}},
    {fs:3,os:3,rp:10,g:{s:3,t:30},mol:{s:3,r:25},cr:{s:3,r:25}},
    {fs:3,os:3,rp:12,g:{s:3,t:40},mol:{s:4,r:20},cr:{s:4,r:20}},
    {fs:4,os:3,rp:10,g:{s:3,t:50},mol:{s:4,r:20},cr:{s:4,r:20}},
    {fs:4,os:4,rp:10,g:{s:3,t:60},mol:{s:4,r:20},cr:{s:4,r:20}},
    {fs:4,os:4,rp:10,g:{s:3,t:60},mol:{s:4,r:20},cr:{s:4,r:20},wn:true},
    {fs:4,os:4,rp:12,g:{s:3,t:60},mol:{s:4,r:25},cr:{s:4,r:25}},
  ][L];
}
const SPORT_NAMES=['',...['Routine fixe','Consolidation','Endurance I','Endurance II','Intensité I','Intensité II','Progression charge','Force maximale']];

function sportExos(lv,day){
  const c=sportCfg(lv);
  if(day==='A') return [
    `Pompes — ${c.fs} × ${c.rp} reps`,
    `Rowing haltère — ${c.fs} × ${c.rp} par bras`,
    `Développé épaules — ${c.fs} × ${c.rp} reps`,
    `Curl biceps — ${c.os} × ${c.rp} reps`,
    `Extension triceps — ${c.os} × ${c.rp} reps`,
    `Gainage — ${c.g.s} × ${c.g.t} secondes`,
  ];
  return [
    `Squat haltères — ${c.fs} × ${c.rp} reps`,
    `Fentes — ${c.fs} × ${c.rp} par jambe`,
    `Soulevé de terre — ${c.fs} × ${c.rp} reps`,
    `Mollets debout — ${c.mol.s} × ${c.mol.r} reps`,
    `Crunch — ${c.cr.s} × ${c.cr.r} reps`,
    `Relevés de jambes — ${c.os} × ${c.rp} reps`,
  ];
}

// ════════════════════════════════
//  ÉTAT & SAUVEGARDE
// ════════════════════════════════

function defaultState(){
  return {
    xp:0, streak:0, lastDate:null,
    n:{ lv:1, pts:0, status:null, chk:[false,false,false,false] },
    l:{ lv:1, pts:0, status:null, book:'', page:0, total:0, startPage:0 },
    s:{ lv:1, pts:0, status:null, day:'A', chk:[false,false,false,false,false,false] },
    d:{ lv:1, pts:0, status:null, name:'', chk:[false] },
    cfg:{ snack:'09:00', dinner:'18:45' },
  };
}

let D=(()=>{try{const s=localStorage.getItem('serments_v2');return s?JSON.parse(s):defaultState();}catch{return defaultState();}})();
function save(){localStorage.setItem('serments_v2',JSON.stringify(D));}

// ════════════════════════════════
//  RESET QUOTIDIEN
// ════════════════════════════════

function todayStr(){return new Date().toISOString().slice(0,10);}

function dailyReset(){
  const td=todayStr();
  if(D.lastDate===td) return;

  if(D.lastDate){
    // Calcul streak de la veille
    const all=[D.n,D.l,D.s,D.d];
    const allOk=all.every(x=>x.status==='reussi'||x.status==='minimum');
    const allDone=all.every(x=>x.status!==null);
    D.streak=(allOk&&allDone)?D.streak+1:0;

    // Alternance Jour A/B sport
    if(D.s.status==='reussi'||D.s.status==='minimum')
      D.s.day=D.s.day==='A'?'B':'A';
  }

  // Reset états journaliers
  D.n.status=null; D.n.chk=[false,false,false,false];
  D.l.status=null; D.l.startPage=D.l.page;
  D.s.status=null; D.s.chk=[false,false,false,false,false,false];
  D.d.status=null; D.d.chk=[false];
  D.lastDate=td;
  save();
}

// ════════════════════════════════
//  LOGIQUE DE JEU
// ════════════════════════════════

function getRank(xp){
  for(let i=RANKS.length-1;i>=0;i--)if(xp>=RANKS[i].min)return RANKS[i];
  return RANKS[0];
}

function validate(dom,status){
  const x=getDom(dom);
  if(x.status!==null)return;
  x.status=status;

  let xpGain=0;
  if(status==='reussi'){ xpGain=20; x.pts=Math.min(x.pts+1,3); }
  else if(status==='minimum'){ xpGain=5; }
  else{ xpGain=0; x.pts=Math.max(0,x.pts-1); }

  D.xp+=xpGain;
  if(xpGain>0) toast(`+${xpGain} XP`,'gold');

  // Level up ?
  if(x.pts>=3){
    x.lv++; x.pts=0;
    const name={n:'Nutrition',l:'Lecture',s:'Sport',d:'Devoirs'}[dom];
    setTimeout(()=>toast(`✦ ${name} — Niveau ${x.lv}`,'ok'),400);
    const card=document.getElementById('card-'+domKey(dom));
    card.classList.add('lv-anim');
    setTimeout(()=>card.classList.remove('lv-anim'),1500);
  }

  // Bonus si 4/4 réussi
  const all=[D.n,D.l,D.s,D.d];
  if(all.every(x=>x.status==='reussi')){
    D.xp+=50;
    setTimeout(()=>toast('✦ Journée complète · +50 XP','ok'),700);
  }

  save();
  renderAll();
}

function toggleChk(dom,i){
  const x=getDom(dom);
  if(x.status!==null)return;
  x.chk[i]=!x.chk[i];
  save();
  renderBody(dom);
}

function getDom(d){ return{n:D.n,l:D.l,s:D.s,d:D.d}[d]; }
function domKey(d){ return{n:'nutrition',l:'lecture',s:'sport',d:'devoirs'}[d]; }

// ════════════════════════════════
//  RENDER
// ════════════════════════════════

function renderAll(){
  renderHeader();
  ['n','l','s','d'].forEach(renderBody);
}

function renderHeader(){
  const r=getRank(D.xp);
  document.getElementById('hRank').textContent=r.n;
  document.getElementById('hXP').textContent=D.xp+' XP';
  document.getElementById('hStreak').textContent=D.streak;

  const all=[D.n,D.l,D.s,D.d];
  const done=all.every(x=>x.status!==null);
  const allR=all.every(x=>x.status==='reussi');
  const allM=all.every(x=>x.status==='reussi'||x.status==='minimum');
  const anyX=all.some(x=>x.status==='rate');
  const el=document.getElementById('hDay');
  if(!done){el.textContent='En cours';el.className='day-badge';}
  else if(allR){el.textContent='✦ Journée complète';el.className='day-badge complete';}
  else if(allM&&!anyX){el.textContent='○ Journée sauvée';el.className='day-badge saved';}
  else{el.textContent='✕ Journée incomplète';el.className='day-badge failed';}
}

function renderMeta(dom){
  const map={
    n:{lvls:NUT_LVL,maxLv:5},
    l:{lvls:LEC_LVL,maxLv:10},
    s:{lvls:null,maxLv:8},
    d:{lvls:DEV_LVL,maxLv:8},
  };
  const x=getDom(dom);
  const key=domKey(dom);

  // Level badge
  document.getElementById('lv-'+key).textContent='Niveau '+x.lv;

  // Subtitle
  const sbEl=document.getElementById('sb-'+key);
  if(dom==='n'){ const lv=NUT_LVL[Math.min(x.lv,NUT_LVL.length-1)];sbEl.textContent=lv?lv.n:'Avancé'; }
  else if(dom==='l'){ const lv=LEC_LVL[Math.min(x.lv,LEC_LVL.length-1)];sbEl.textContent=lv?lv.n:'Maîtrise'; }
  else if(dom==='s'){ sbEl.textContent=SPORT_NAMES[Math.min(x.lv,8)]||'Maîtrise'; }
  else if(dom==='d'){ const lv=DEV_LVL[Math.min(x.lv,DEV_LVL.length-1)];sbEl.textContent=lv?lv.n:'Avancé'; }

  // Dots
  const dotsEl=document.getElementById('dots-'+key);
  dotsEl.innerHTML='';
  for(let i=0;i<3;i++){const d=document.createElement('div');d.className='dot'+(i<x.pts?' on':'');dotsEl.appendChild(d);}
  document.getElementById('pt-'+key).textContent=x.pts+' / 3';

  // Card class
  const card=document.getElementById('card-'+key);
  card.className='card'+(x.status?' v-'+x.status:'');
}

function renderBody(dom){
  renderMeta(dom);
  const x=getDom(dom);
  const key=domKey(dom);
  const bd=document.getElementById('bd-'+key);

  if(dom==='n') bd.innerHTML=x.status?vBox(x.status):bodyNutrition();
  else if(dom==='l') bd.innerHTML=x.status?vBox(x.status,lBookExtra()):bodyLecture();
  else if(dom==='s') bd.innerHTML=x.status?vBox(x.status,`<div style="font-size:10px;color:var(--muted);margin-top:3px;">Jour ${D.s.day} — ${D.s.day==='A'?'Haut du corps':'Bas du corps + abdos'}</div>`):bodySport();
  else if(dom==='d') bd.innerHTML=x.status?vBox(x.status,D.d.name?`<div style="font-size:10px;color:var(--muted);margin-top:3px;">${D.d.name}</div>`:''):bodyDevoirs();
}

// ────── NUTRITION ──────
function bodyNutrition(){
  const c=D.cfg;
  const tasks=['Petit-déjeuner','Snack — '+c.snack,'Repas du midi','Repas du soir — '+c.dinner];
  const items=tasks.map((t,i)=>`<li class="cli${D.n.chk[i]?' chk':''}" onclick="toggleChk('n',${i})"><div class="cli-box">${D.n.chk[i]?'✓':''}</div><span class="cli-lbl">${t}</span></li>`).join('');
  return `<div class="sep"></div><ul class="checklist">${items}</ul>${btnRow('n')}`;
}

// ────── LECTURE ──────
function bodyLecture(){
  const l=D.l;
  const lvl=LEC_LVL[Math.min(l.lv,LEC_LVL.length-1)]||LEC_LVL[LEC_LVL.length-1];
  const pct=l.total>0?Math.floor((l.page/l.total)*100):0;
  let mission=`Lire ${lvl.p} pages aujourd'hui`;
  if(lvl.note) mission+=' — noter 1 idée';
  if(lvl.sum)  mission+=' — résumé de 3 lignes';

  return `<div class="sep"></div>
  <div class="fg">
    <label class="flbl">${l.book||'Livre actuel'}</label>
    <div class="frow">
      <div>
        <label class="flbl">Page actuelle</label>
        <input class="finput" type="number" value="${l.page}" min="0"
          oninput="D.l.page=parseInt(this.value)||0;save();updateBkBar();" placeholder="0"/>
      </div>
      <div>
        <label class="flbl">Total pages</label>
        <input class="finput" type="number" value="${l.total||''}" min="1"
          oninput="D.l.total=parseInt(this.value)||0;save();updateBkBar();" placeholder="..."/>
      </div>
    </div>
    ${l.total>0?`<div class="bk-bar"><div class="bk-fill" id="bkFill" style="width:${pct}%;"></div></div><div class="bk-txt" id="bkTxt">${pct}% du livre · p.${l.page} / ${l.total}</div>`:''}
  </div>
  <div class="sep"></div>
  <div class="mission-line">${mission}</div>
  ${btnRow('l')}`;
}

function lBookExtra(){
  const l=D.l;
  if(!l.total) return '';
  const pct=Math.floor((l.page/l.total)*100);
  return `<div style="font-size:10px;color:var(--muted);margin-top:3px;">${pct}% du livre · p.${l.page}/${l.total}</div>`;
}

function updateBkBar(){
  const l=D.l;
  const pct=l.total>0?Math.floor((l.page/l.total)*100):0;
  const f=document.getElementById('bkFill');
  const t=document.getElementById('bkTxt');
  if(f)f.style.width=pct+'%';
  if(t)t.textContent=`${pct}% du livre · p.${l.page} / ${l.total}`;
}

// ────── SPORT ──────
function bodySport(){
  const s=D.s;
  const day=s.day;
  const exos=sportExos(s.lv,day);
  const cfg=sportCfg(s.lv);
  const dayLabel=day==='A'?'Jour A — Haut du corps':'Jour B — Bas du corps + abdos';
  const nextDay=day==='A'?'B':'A';
  const items=exos.map((ex,i)=>`<li class="cli${s.chk[i]?' chk':''}" onclick="toggleChk('s',${i})"><div class="cli-box">${s.chk[i]?'✓':''}</div><span class="cli-lbl">${ex}</span></li>`).join('');
  const wn=cfg&&cfg.wn?`<div style="font-size:11px;color:var(--gold);margin:8px 0 4px;">↑ Ce niveau : augmenter légèrement le poids</div>`:'';
  return `<div class="sep"></div>
  <div style="font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;margin-bottom:10px;">${dayLabel} <span style="margin-left:8px;opacity:.5;">· Demain : Jour ${nextDay}</span></div>
  <ul class="checklist">${items}</ul>${wn}${btnRow('s')}`;
}

// ────── DEVOIRS ──────
function bodyDevoirs(){
  const d=D.d;
  const lvl=DEV_LVL[Math.min(d.lv,DEV_LVL.length-1)]||DEV_LVL[DEV_LVL.length-1];
  const done=d.chk[0];
  return `<div class="sep"></div>
  <div class="mission-line">${lvl.d}</div>
  <div class="fg">
    <label class="flbl">Devoir du jour</label>
    <input class="finput" value="${d.name||''}" placeholder="Nom du devoir..."
      oninput="D.d.name=this.value;save();"/>
  </div>
  <ul class="checklist">
    <li class="cli${done?' chk':''}" onclick="toggleChk('d',0)">
      <div class="cli-box">${done?'✓':''}</div>
      <span class="cli-lbl">Devoir terminé</span>
    </li>
  </ul>
  ${btnRow('d')}`;
}

// ────── SHARED ──────
function btnRow(dom){
  return `<div class="actions">
    <button class="btn btn-r" onclick="validate('${dom}','reussi')">Réussi</button>
    <button class="btn btn-m" onclick="validate('${dom}','minimum')">Minimum</button>
    <button class="btn btn-x" onclick="validate('${dom}','rate')">Raté</button>
  </div>`;
}

function vBox(status,extra){
  const m={
    reussi: {cls:'reussi', t:'✦ Réussi — +20 XP'},
    minimum:{cls:'minimum',t:'○ Minimum accompli — +5 XP'},
    rate:   {cls:'rate',   t:'✕ Raté — −1 point'},
  }[status]||{cls:'rate',t:'✕'};
  return `<div class="sep"></div><div class="v-box ${m.cls}">${m.t}${extra||''}</div>`;
}

// ════════════════════════════════
//  PARAMÈTRES
// ════════════════════════════════

function toggleStg(){
  const p=document.getElementById('stgPanel');
  p.classList.toggle('open');
  if(p.classList.contains('open')){
    document.getElementById('s-book').value=D.l.book||'';
    document.getElementById('s-page').value=D.l.page||0;
    document.getElementById('s-total').value=D.l.total||'';
    document.getElementById('s-snack').value=D.cfg.snack||'09:00';
    document.getElementById('s-dinner').value=D.cfg.dinner||'18:45';
    document.getElementById('s-devoir').value=D.d.name||'';
  }
}

function saveStg(){
  D.l.book  =document.getElementById('s-book').value.trim();
  D.l.page  =parseInt(document.getElementById('s-page').value)||0;
  D.l.total =parseInt(document.getElementById('s-total').value)||0;
  D.cfg.snack =document.getElementById('s-snack').value||'09:00';
  D.cfg.dinner=document.getElementById('s-dinner').value||'18:45';
  D.d.name  =document.getElementById('s-devoir').value.trim();
  save();
  document.getElementById('stgPanel').classList.remove('open');
  renderAll();
  toast('Enregistré');
}

function exportData(){
  const b=new Blob([JSON.stringify(D,null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(b);
  a.download='serments_'+todayStr()+'.json';a.click();
}

function handleImport(e){
  const f=e.target.files[0];if(!f)return;
  const r=new FileReader();
  r.onload=ev=>{try{D=JSON.parse(ev.target.result);save();renderAll();toast('Importé');}catch{toast('Erreur fichier');}};
  r.readAsText(f);
}

// ════════════════════════════════
//  TOAST
// ════════════════════════════════

function toast(msg,type){
  const w=document.getElementById('toasts');
  const el=document.createElement('div');
  el.className='toast '+(type||'');el.textContent=msg;
  w.appendChild(el);setTimeout(()=>el.remove(),3200);
}

// ════════════════════════════════
//  INIT
// ════════════════════════════════
dailyReset();
renderAll();
</script>
</body>
</html>
