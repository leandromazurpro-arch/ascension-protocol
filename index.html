<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Serments du Jour</title>
<meta name="theme-color" content="#0c0909"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<link rel="manifest" href="manifest.json"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,700;1,500&family=Inter:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#0c0909;--surf:#150d0d;--surf2:#1e1212;--border:#2a1616;
  --bx:#8b1a1a;--bx2:#5c1010;--gold:#c49a38;--gold2:#8a6820;
  --txt:#ede4d5;--txt2:#9a8070;--txt3:#5a4040;
  --ok:#3d6b3d;--ok2:rgba(61,107,61,.15);
  --mn:#7a6015;--mn2:rgba(122,96,21,.15);
  --fail:#8a1a1a;--fail2:rgba(138,26,26,.15);
}
body{background:var(--bg);color:var(--txt);font-family:'Inter',system-ui,sans-serif;font-size:14px;min-height:100vh;}

/* ── HEADER ── */
.hdr{padding:18px 18px 12px;border-bottom:1px solid var(--border);background:linear-gradient(180deg,#110808 0%,var(--bg) 100%);}
.hdr-top{display:flex;justify-content:space-between;align-items:flex-start;}
.hdr-title{font-family:'Playfair Display',Georgia,serif;font-size:24px;font-weight:700;letter-spacing:.5px;line-height:1.1;}
.hdr-title em{color:var(--bx);font-style:normal;}
.hdr-date{font-size:10px;color:var(--txt3);text-transform:uppercase;letter-spacing:2px;margin-top:3px;}
.hdr-right{display:flex;flex-direction:column;align-items:flex-end;gap:4px;}
.rank-badge{font-size:11px;padding:2px 10px;border:1px solid var(--gold2);border-radius:20px;color:var(--gold);font-weight:500;}
.hdr-stats{display:flex;gap:14px;margin-top:10px;}
.stat{font-size:12px;color:var(--txt2);}
.stat b{color:var(--txt);font-weight:600;}

/* ── DAY STATUS ── */
.day-banner{padding:8px 18px;font-size:12px;text-align:center;border-bottom:1px solid var(--border);}
.day-banner.complete{background:var(--ok2);color:#5a9a5a;}
.day-banner.saved{background:var(--mn2);color:#9a8030;}
.day-banner.failed{background:var(--fail2);color:#9a3030;}
.day-banner.pending{color:var(--txt3);}

/* ── LAYOUT ── */
.layout{display:grid;grid-template-columns:1fr;max-width:960px;margin:0 auto;}
@media(min-width:720px){.layout{grid-template-columns:200px 1fr;align-items:start;}}

/* ── WEEKLY SIDEBAR ── */
.weekly{padding:18px 14px;border-bottom:1px solid var(--border);}
@media(min-width:720px){.weekly{border-bottom:none;border-right:1px solid var(--border);position:sticky;top:0;max-height:100vh;overflow-y:auto;}}
.wk-title{font-family:'Playfair Display',serif;font-size:11px;color:var(--txt3);text-transform:uppercase;letter-spacing:2px;margin-bottom:14px;}

/* Desktop: rows */
.wk-rows{display:none;}
@media(min-width:720px){.wk-rows{display:block;}}
.wk-row{display:flex;align-items:center;gap:6px;padding:5px 0;border-bottom:1px solid var(--border);}
.wk-row:last-child{border-bottom:none;}
.wk-row.today .wk-lbl{color:var(--gold);}
.wk-lbl{font-size:10px;color:var(--txt3);width:26px;flex-shrink:0;text-transform:uppercase;}
.wk-dots{display:flex;gap:3px;}
.wk-d{width:9px;height:9px;border-radius:50%;background:var(--surf2);border:1px solid var(--border);}
.wk-d.ok{background:var(--ok);border-color:var(--ok);}
.wk-d.mn{background:var(--mn);border-color:var(--mn);}
.wk-d.fl{background:var(--fail);border-color:var(--fail);}
.wk-d.now{background:transparent;border:1px solid var(--bx);animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{opacity:.4}50%{opacity:1}}

/* Mobile: columns */
.wk-cols{display:flex;gap:6px;overflow-x:auto;scrollbar-width:none;padding-bottom:4px;}
.wk-cols::-webkit-scrollbar{display:none;}
@media(min-width:720px){.wk-cols{display:none;}}
.wk-col{flex-shrink:0;text-align:center;width:34px;}
.wk-col .wk-lbl{display:block;margin-bottom:4px;}
.wk-col-dots{display:flex;flex-direction:column;gap:3px;align-items:center;}

.wk-legend{display:flex;flex-wrap:wrap;gap:8px;margin-top:12px;padding-top:10px;border-top:1px solid var(--border);}
.wk-leg{display:flex;align-items:center;gap:4px;font-size:9px;color:var(--txt3);}
.wk-leg-dot{width:7px;height:7px;border-radius:50%;}

.wk-sum{margin-top:12px;font-size:11px;color:var(--txt2);line-height:1.7;}
.wk-sum b{color:var(--txt);}

/* ── DOMAIN CARDS ── */
.domains{padding:14px;display:flex;flex-direction:column;gap:10px;}
.dcard{background:var(--surf);border:1px solid var(--border);border-radius:12px;overflow:hidden;transition:border-color .4s;}
.dcard.s-ok{border-color:rgba(61,107,61,.45);}
.dcard.s-mn{border-color:rgba(122,96,21,.45);}
.dcard.s-fl{border-color:rgba(138,26,26,.45);}

.dcard-hdr{padding:13px 15px 10px;display:flex;justify-content:space-between;align-items:flex-start;border-bottom:1px solid var(--border);}
.dcard-left{display:flex;align-items:center;gap:9px;}
.dcard-icon{font-size:20px;line-height:1;}
.dcard-nm{font-family:'Playfair Display',serif;font-size:15px;font-weight:600;}
.dcard-lv{font-size:10px;color:var(--txt2);margin-top:1px;}
.prog-dots{display:flex;gap:4px;align-items:center;}
.pdot{width:10px;height:10px;border-radius:50%;border:1px solid var(--bx2);background:transparent;transition:background .3s;}
.pdot.on{background:var(--bx);border-color:var(--bx);}
.prog-frac{font-size:9px;color:var(--txt3);margin-left:3px;}

.dcard-body{padding:13px 15px;}
.mission-desc{font-size:12px;color:var(--txt2);font-style:italic;margin-bottom:11px;line-height:1.6;border-left:2px solid var(--bx2);padding-left:9px;}

/* Checklist */
.cklist{display:flex;flex-direction:column;gap:6px;margin-bottom:12px;}
.ck-item{display:flex;align-items:center;gap:9px;padding:5px 0;cursor:pointer;}
.ck-box{width:16px;height:16px;border:1px solid var(--border);border-radius:4px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:10px;color:var(--ok);background:transparent;transition:all .2s;}
.ck-item.done .ck-box{background:var(--ok);border-color:var(--ok);}
.ck-item.done .ck-txt{text-decoration:line-through;color:var(--txt2);}
.ck-txt{font-size:13px;}

/* Book fields */
.book-fields{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:9px;}
.bf-group{display:flex;align-items:center;gap:5px;}
.bf-lbl{font-size:10px;color:var(--txt2);}
.bf-inp{background:var(--surf2);border:1px solid var(--border);border-radius:5px;padding:4px 8px;color:var(--txt);font-size:12px;width:90px;}
.bf-inp.wide{width:150px;}
.bf-inp:focus{outline:none;border-color:var(--bx2);}
.book-bar{height:3px;background:var(--surf2);border-radius:2px;margin-bottom:6px;overflow:hidden;}
.book-bar-fill{height:100%;background:var(--gold2);border-radius:2px;transition:width .5s;}
.book-pct{font-size:10px;color:var(--txt3);text-align:right;margin-bottom:10px;}

/* Sport */
.sport-badge{display:inline-block;padding:2px 9px;background:var(--bx2);border-radius:20px;font-size:10px;margin-bottom:10px;}
.ex-list{display:flex;flex-direction:column;gap:5px;margin-bottom:12px;}
.ex-item{display:flex;justify-content:space-between;align-items:center;padding:6px 10px;background:var(--surf2);border-radius:6px;cursor:pointer;transition:opacity .2s;}
.ex-item.done{opacity:.4;}
.ex-item.done .ex-name{text-decoration:line-through;}
.ex-name{font-size:12px;}
.ex-sets{font-size:11px;color:var(--bx);font-weight:500;}
.ex-ck{font-size:12px;color:var(--txt3);}
.ex-item.done .ex-ck{color:var(--ok);}

/* Devoirs */
.dv-inp{width:100%;background:var(--surf2);border:1px solid var(--border);border-radius:6px;padding:8px 10px;color:var(--txt);font-size:13px;margin-bottom:12px;}
.dv-inp:focus{outline:none;border-color:var(--bx2);}
.dv-inp::placeholder{color:var(--txt3);}

/* Action buttons */
.act-btns{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;}
.act-btn{padding:9px 4px;border-radius:7px;border:1px solid;font-size:12px;font-weight:500;cursor:pointer;background:transparent;color:var(--txt);transition:all .2s;font-family:'Inter',sans-serif;}
.act-btn:active{transform:scale(.96);}
.btn-ok{border-color:rgba(61,107,61,.5);color:#5a9a5a;}
.btn-ok:hover{background:var(--ok2);}
.btn-mn{border-color:rgba(122,96,21,.5);color:#9a8030;}
.btn-mn:hover{background:var(--mn2);}
.btn-fl{border-color:rgba(138,26,26,.5);color:#9a3030;}
.btn-fl:hover{background:var(--fail2);}

/* Result + edit */
.result-row{display:flex;align-items:center;justify-content:space-between;padding:9px 12px;border-radius:7px;font-size:13px;font-weight:500;}
.result-row.ok{background:var(--ok2);color:#5a9a5a;border:1px solid rgba(61,107,61,.3);}
.result-row.mn{background:var(--mn2);color:#9a8030;border:1px solid rgba(122,96,21,.3);}
.result-row.fl{background:var(--fail2);color:#9a3030;border:1px solid rgba(138,26,26,.3);}
.edit-btn{background:none;border:none;color:var(--txt2);font-size:11px;cursor:pointer;text-decoration:underline;padding:0;font-family:'Inter',sans-serif;}

/* Footer */
.footer{padding:16px;text-align:center;border-top:1px solid var(--border);margin-top:4px;}
.footer-btn{background:none;border:1px solid var(--border);color:var(--txt2);padding:7px 18px;border-radius:20px;font-size:12px;cursor:pointer;}
.footer-btn:hover{border-color:var(--bx2);color:var(--txt);}

/* Settings modal */
.sov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:200;align-items:flex-end;justify-content:center;}
.sov.open{display:flex;}
.spanel{background:var(--surf);border:1px solid var(--border);border-radius:16px 16px 0 0;padding:22px 18px 32px;width:100%;max-width:600px;max-height:86vh;overflow-y:auto;position:relative;}
.spanel-title{font-family:'Playfair Display',serif;font-size:18px;margin-bottom:18px;}
.sclose{position:absolute;top:14px;right:16px;background:none;border:none;color:var(--txt2);font-size:24px;cursor:pointer;}
.ssec{margin-bottom:16px;padding-bottom:16px;border-bottom:1px solid var(--border);}
.ssec:last-child{border-bottom:none;margin-bottom:0;}
.ssec-lbl{font-size:10px;text-transform:uppercase;letter-spacing:1.5px;color:var(--txt2);margin-bottom:10px;}
.srow{display:flex;align-items:center;gap:10px;margin-bottom:7px;}
.srow label{font-size:12px;color:var(--txt2);flex:1;}
.sinp{background:var(--surf2);border:1px solid var(--border);border-radius:5px;padding:6px 9px;color:var(--txt);font-size:13px;}
.sinp:focus{outline:none;border-color:var(--bx2);}
.sinp.w-full{width:100%;margin-bottom:6px;}
.sbtn{background:var(--bx2);border:none;color:var(--txt);padding:9px 16px;border-radius:7px;font-size:13px;cursor:pointer;margin-top:4px;}
.sbtn:hover{background:var(--bx);}
.sbtn-outline{background:transparent;border:1px solid var(--border);color:var(--txt2);padding:8px 14px;border-radius:7px;font-size:12px;cursor:pointer;margin-top:4px;}
.sync-status{font-size:11px;color:var(--txt2);margin-top:6px;}
.sync-status.ok{color:#5a9a5a;}
.sync-status.err{color:#9a3030;}

/* Toasts */
.toasts{position:fixed;top:16px;left:50%;transform:translateX(-50%);z-index:300;display:flex;flex-direction:column;align-items:center;gap:6px;pointer-events:none;}
.toast{background:var(--surf);border:1px solid var(--gold2);color:var(--gold);padding:9px 20px;border-radius:20px;font-size:13px;font-family:'Playfair Display',serif;white-space:nowrap;animation:tIn .3s ease,tOut .3s ease 2.7s forwards;}
.toast.red{border-color:rgba(138,26,26,.5);color:#9a3030;}
.toast.green{border-color:rgba(61,107,61,.5);color:#5a9a5a;}
@keyframes tIn{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}
@keyframes tOut{from{opacity:1}to{opacity:0}}
</style>
</head>
<body>

<!-- HEADER -->
<div class="hdr">
  <div class="hdr-top">
    <div>
      <div class="hdr-title">Serments <em>du Jour</em></div>
      <div class="hdr-date" id="hdrDate"></div>
    </div>
    <div class="hdr-right">
      <div class="rank-badge" id="hdrRank">E-Rang</div>
    </div>
  </div>
  <div class="hdr-stats">
    <div class="stat">🔥 Streak <b id="hdrStreak">0</b></div>
    <div class="stat">⭐ <b id="hdrXP">0</b> XP</div>
    <div class="stat" id="hdrSync" style="margin-left:auto;font-size:10px;color:var(--txt3);"></div>
  </div>
</div>

<!-- DAY STATUS -->
<div class="day-banner pending" id="dayBanner">Accomplis tes serments.</div>

<div class="layout">

  <!-- WEEKLY SIDEBAR -->
  <div class="weekly">
    <div class="wk-title">Semaine</div>

    <!-- Desktop rows -->
    <div class="wk-rows" id="wkRows"></div>

    <!-- Mobile columns -->
    <div class="wk-cols" id="wkCols"></div>

    <div class="wk-legend">
      <div class="wk-leg"><div class="wk-leg-dot" style="background:var(--ok)"></div>Réussi</div>
      <div class="wk-leg"><div class="wk-leg-dot" style="background:var(--mn)"></div>Minimum</div>
      <div class="wk-leg"><div class="wk-leg-dot" style="background:var(--fail)"></div>Raté</div>
    </div>
    <div class="wk-sum" id="wkSummary"></div>
  </div>

  <!-- DOMAIN CARDS -->
  <div class="domains">
    <div class="dcard" id="card-nutrition"></div>
    <div class="dcard" id="card-lecture"></div>
    <div class="dcard" id="card-sport"></div>
    <div class="dcard" id="card-devoirs"></div>
  </div>
</div>

<div class="footer">
  <button class="footer-btn" onclick="openSettings()">⚙ Paramètres &amp; Sync</button>
</div>

<!-- SETTINGS -->
<div class="sov" id="sov">
  <div class="spanel">
    <div class="spanel-title">Paramètres</div>
    <button class="sclose" onclick="closeSettings()">×</button>

    <div class="ssec">
      <div class="ssec-lbl">📖 Livre</div>
      <div class="srow"><label>Nom du livre</label></div>
      <input class="sinp w-full" id="sBookName" placeholder="Titre du livre actuel"/>
      <div class="srow" style="margin-top:7px;">
        <label>Page actuelle</label>
        <input class="sinp" id="sBookCurrent" type="number" min="0" style="width:80px;"/>
        <label>Total pages</label>
        <input class="sinp" id="sBookTotal" type="number" min="1" style="width:80px;"/>
      </div>
    </div>

    <div class="ssec">
      <div class="ssec-lbl">🍽 Nutrition — Horaires</div>
      <div class="srow"><label>Snack matin</label><input class="sinp" id="sSnack" type="time" value="09:00" style="width:100px;"/></div>
      <div class="srow"><label>Repas du soir</label><input class="sinp" id="sDinner" type="time" value="18:45" style="width:100px;"/></div>
    </div>

    <div class="ssec">
      <div class="ssec-lbl">🔄 Synchronisation entre appareils</div>
      <div style="font-size:12px;color:var(--txt2);margin-bottom:10px;line-height:1.6;">Entre ton token GitHub (scope <b>repo</b>) pour synchroniser ta progression automatiquement entre ton téléphone et ton PC.</div>
      <input class="sinp w-full" id="sToken" type="password" placeholder="ghp_...  (stocké uniquement sur cet appareil)"/>
      <div class="sync-status" id="syncStatusMsg"></div>
    </div>

    <div class="ssec">
      <div class="ssec-lbl">⚠ Reset</div>
      <button class="sbtn-outline" onclick="resetDomain()" style="color:#9a3030;border-color:rgba(138,26,26,.4);">Réinitialiser un domaine...</button>
    </div>

    <button class="sbtn" onclick="saveSettings()" style="width:100%;margin-top:4px;">Enregistrer</button>
  </div>
</div>

<div class="toasts" id="toasts"></div>

<script>
// ═══════════════════════════════════════════════
//  DATA
// ═══════════════════════════════════════════════
const REPO = 'leandromazurpro-arch/ascension-protocol';
const DATA_FILE = 'progression.json';

const RANKS = [
  {n:'E-Rang',min:0},{n:'D-Rang',min:200},{n:'C-Rang',min:500},
  {n:'B-Rang',min:1000},{n:'A-Rang',min:1800},{n:'S-Rang',min:3000},
];

const NUTRITION_LEVELS = [
  {n:'Structure',desc:'Respecter tes 4 moments de nourriture aujourd\'hui.'},
  {n:'Protéines',desc:'4 repas + 1 source de protéine à 2 repas.'},
  {n:'Protéines+',desc:'4 repas + 1 source de protéine à 3 repas.'},
  {n:'Snack sain',desc:'4 repas + snack sain + protéines à 2 repas.'},
  {n:'Préparation',desc:'4 repas + préparer 1 repas à l\'avance.'},
];

const LECTURE_PAGES = [5,7,10,12,15,20,20,25,25,30];
const LECTURE_NOTES = [null,null,null,null,null,null,'+ noter 1 idée','+ noter 1 idée','+ noter 1 idée','+ résumé 3 lignes'];

const SPORT_A = [ // Haut du corps
  {name:'Pompes',note:''},
  {name:'Rowing haltère',note:'par bras'},
  {name:'Développé épaules',note:''},
  {name:'Curl biceps',note:''},
  {name:'Extension triceps',note:''},
  {name:'Gainage',note:'',isSpecial:true,specialKey:'gainage'},
];
const SPORT_B = [ // Bas du corps + abdos
  {name:'Squat haltères',note:''},
  {name:'Fentes',note:'par jambe'},
  {name:'Soulevé de terre',note:''},
  {name:'Mollets debout',note:'',isSpecial:true,specialKey:'mollets'},
  {name:'Crunch',note:'',isSpecial:true,specialKey:'crunch'},
  {name:'Relevés de jambes',note:''},
];

// Sets/reps par niveau (index 0 = niveau 1)
function getSportConfig(lv) {
  const l = Math.min(lv-1, 7);
  const sets  = [2,3,3,3,4,4,4,4][l];
  const reps  = [10,10,10,12,10,10,10,12][l];
  return {
    sets, reps,
    gainage:  ['30sec','40sec','30sec','40sec','50sec','60sec','60sec','60sec'][l],
    gSets:    [2,2,3,3,3,3,3,3][l],
    mollets:  [20,20,20,25,20,20,25,25][l],
    mSets:    [2,3,3,3,4,4,4,4][l],
    crunch:   [20,20,20,25,20,20,25,25][l],
    cSets:    [2,3,3,3,4,4,4,4][l],
  };
}

const DEVOIRS_LEVELS = [
  'Terminer 1 devoir aujourd\'hui.',
  'Terminer 1 devoir + le relire avant de rendre.',
  'Terminer 1 devoir avant 18h.',
  'Terminer 2 devoirs aujourd\'hui.',
  'Terminer 2 devoirs + les relire.',
  'Terminer 2 devoirs avant 18h.',
  'Terminer tous les devoirs du jour.',
  'Terminer tous les devoirs + préparer ceux de demain.',
];

function defaultData() {
  return {
    xp: 0,
    streak: { cur: 0, best: 0, lastDate: null },
    domains: {
      nutrition: { level: 1, progress: 0, todayStatus: null },
      lecture:   { level: 1, progress: 0, todayStatus: null },
      sport:     { level: 1, progress: 0, todayStatus: null, dayAB: 'A' },
      devoirs:   { level: 1, progress: 0, todayStatus: null },
    },
    nutrition: {
      checks: { petit: false, snack: false, midi: false, soir: false },
      snackTime: '09:00', dinnerTime: '18:45',
    },
    lecture: { bookName: '', currentPage: 0, totalPages: 0, checks: {} },
    sport:   { checks: {} },
    devoirs: { taskName: '', checks: {} },
    history: [], // [{date, nutrition, lecture, sport, devoirs, xpGained}]
    lastDate: null,
  };
}

let D = load();

function load() {
  try { const s = localStorage.getItem('serments_v1'); if (s) return JSON.parse(s); } catch(e){}
  return defaultData();
}
function save() {
  localStorage.setItem('serments_v1', JSON.stringify(D));
  syncToGitHub();
}

// ═══════════════════════════════════════════════
//  GITHUB SYNC
// ═══════════════════════════════════════════════
let _syncTimer = null;
let _syncSha   = null;

function getToken() { return localStorage.getItem('gh_token') || ''; }

async function syncFromGitHub() {
  const token = getToken();
  try {
    const url = `https://raw.githubusercontent.com/${REPO}/main/${DATA_FILE}?t=${Date.now()}`;
    const res = await fetch(url);
    if (!res.ok) return;
    const remote = await res.json();
    // Merge: take whichever is more recent (compare XP as tiebreaker)
    if (remote && typeof remote.xp === 'number') {
      const localXP = D.xp || 0;
      const remoteXP = remote.xp || 0;
      // Use remote if it has more XP OR same XP but different last date
      if (remoteXP > localXP || (remoteXP === localXP && remote.lastDate !== D.lastDate)) {
        D = remote;
        localStorage.setItem('serments_v1', JSON.stringify(D));
        renderAll();
        setSync('Synchronisé ✓', true);
        return;
      }
    }
    setSync('Synchronisé ✓', true);
  } catch(e) {}
}

function syncToGitHub() {
  clearTimeout(_syncTimer);
  _syncTimer = setTimeout(async () => {
    const token = getToken();
    if (!token) return;
    setSync('Sync en cours…', false);
    try {
      // Get current SHA
      const info = await fetch(`https://api.github.com/repos/${REPO}/contents/${DATA_FILE}`, {
        headers: { 'Authorization': `token ${token}`, 'Accept': 'application/vnd.github.v3+json' }
      });
      let sha = null;
      if (info.ok) { const j = await info.json(); sha = j.sha; }

      const content = btoa(unescape(encodeURIComponent(JSON.stringify(D, null, 2))));
      const body = { message: 'sync: progression', content };
      if (sha) body.sha = sha;

      const res = await fetch(`https://api.github.com/repos/${REPO}/contents/${DATA_FILE}`, {
        method: 'PUT',
        headers: {
          'Authorization': `token ${token}`,
          'Content-Type':  'application/json',
          'Accept':        'application/vnd.github.v3+json',
        },
        body: JSON.stringify(body),
      });
      if (res.ok) setSync('Synchronisé ✓', true);
      else setSync('Erreur sync', false, true);
    } catch(e) { setSync('Hors ligne', false, true); }
  }, 2000);
}

function setSync(msg, ok, err) {
  const el = document.getElementById('hdrSync');
  const sEl = document.getElementById('syncStatusMsg');
  if (el) el.textContent = msg;
  if (sEl) { sEl.textContent = msg; sEl.className = 'sync-status' + (ok?' ok':err?' err':''); }
}

// ═══════════════════════════════════════════════
//  DAILY RESET
// ═══════════════════════════════════════════════
function todayStr() {
  return new Date().toLocaleDateString('fr-CA'); // YYYY-MM-DD
}

function checkDailyReset() {
  const td = todayStr();
  if (D.lastDate === td) return;

  // Save yesterday to history
  if (D.lastDate) {
    const entry = {
      date: D.lastDate,
      nutrition: D.domains.nutrition.todayStatus,
      lecture:   D.domains.lecture.todayStatus,
      sport:     D.domains.sport.todayStatus,
      devoirs:   D.domains.devoirs.todayStatus,
    };
    D.history.unshift(entry);
    if (D.history.length > 60) D.history.pop();

    // Streak
    const yesterday = new Date(); yesterday.setDate(yesterday.getDate()-1);
    const yStr = yesterday.toLocaleDateString('fr-CA');
    if (D.lastDate === yStr) {
      const allSaved = ['nutrition','lecture','sport','devoirs'].every(k => D.domains[k].todayStatus !== null && D.domains[k].todayStatus !== 'rate');
      if (allSaved) { D.streak.cur++; if (D.streak.cur > D.streak.best) D.streak.best = D.streak.cur; }
      else D.streak.cur = 0;
    } else {
      D.streak.cur = 0;
    }
    D.streak.lastDate = yStr;
  }

  // Reset today
  ['nutrition','lecture','sport','devoirs'].forEach(k => { D.domains[k].todayStatus = null; });
  D.nutrition.checks = { petit: false, snack: false, midi: false, soir: false };
  D.lecture.checks   = {};
  D.sport.checks     = {};
  D.devoirs.checks   = {};
  D.devoirs.taskName = '';
  D.lastDate = td;
  save();
}

// ═══════════════════════════════════════════════
//  XP & RANK
// ═══════════════════════════════════════════════
const XP_MAP = { reussi: 20, minimum: 5, rate: 0 };
const XP_BONUS_ALL = 50;

function addXP(n) { D.xp += n; }
function removeXP(n) { D.xp = Math.max(0, D.xp - n); }
function getRank() {
  let r = RANKS[0];
  for (const rk of RANKS) { if (D.xp >= rk.min) r = rk; }
  return r.n;
}

// ═══════════════════════════════════════════════
//  RESULT LOGIC
// ═══════════════════════════════════════════════
function setResult(domain, result) {
  const dm = D.domains[domain];
  if (dm.todayStatus) return; // already set, use edit btn

  dm.todayStatus = result;

  // XP
  addXP(XP_MAP[result]);

  // Progress
  if (result === 'reussi') {
    dm.progress++;
    if (dm.progress >= 3) {
      dm.level++;
      dm.progress = 0;
      toast(`✦ ${domainLabel(domain)} — Niveau ${dm.level} atteint`, 'gold');
      // Alternate sport day
      if (domain === 'sport') D.domains.sport.dayAB = D.domains.sport.dayAB === 'A' ? 'B' : 'A';
    }
  } else if (result === 'rate') {
    dm.progress = Math.max(0, dm.progress - 1);
  }
  // minimum: no change to progress

  // Bonus: all 4 réussi
  const all4 = ['nutrition','lecture','sport','devoirs'].every(k => D.domains[k].todayStatus === 'reussi');
  if (all4) { addXP(XP_BONUS_ALL); toast('✦ Journée complète — +50 XP bonus', 'gold'); }

  // Update lecture page
  if (domain === 'lecture' && result === 'reussi') {
    const pInput = document.getElementById('lec-page');
    if (pInput && pInput.value) {
      D.lecture.currentPage = parseInt(pInput.value) || D.lecture.currentPage;
    }
  }

  // Update devoir task
  if (domain === 'devoirs') {
    const tInput = document.getElementById('dv-task');
    if (tInput) D.devoirs.taskName = tInput.value;
  }

  save();
  renderAll();
  updateDayBanner();
}

function undoResult(domain) {
  const dm = D.domains[domain];
  const prev = dm.todayStatus;
  if (!prev) return;

  // Reverse XP
  removeXP(XP_MAP[prev]);

  // Reverse progress
  if (prev === 'reussi') {
    // If level was gained (progress would have reset), we can't perfectly undo level, but we can reverse progress before reset
    dm.progress = Math.max(0, dm.progress - 1); // approximate
  } else if (prev === 'rate') {
    dm.progress = Math.min(2, dm.progress + 1);
  }

  // Remove bonus if was all 4
  const was4 = ['nutrition','lecture','sport','devoirs'].every(k => D.domains[k].todayStatus === 'reussi');
  if (was4) removeXP(XP_BONUS_ALL);

  dm.todayStatus = null;
  save();
  renderAll();
  updateDayBanner();
}

function domainLabel(k) {
  return {nutrition:'Nutrition',lecture:'Lecture',sport:'Sport',devoirs:'Devoirs'}[k];
}

// ═══════════════════════════════════════════════
//  RENDER
// ═══════════════════════════════════════════════
function renderAll() {
  renderHeader();
  renderWeekly();
  renderNutrition();
  renderLecture();
  renderSport();
  renderDevoirs();
  updateDayBanner();
}

function renderHeader() {
  const d = new Date();
  const days = ['Dimanche','Lundi','Mardi','Mercredi','Jeudi','Vendredi','Samedi'];
  const months = ['janvier','février','mars','avril','mai','juin','juillet','août','septembre','octobre','novembre','décembre'];
  document.getElementById('hdrDate').textContent = `${days[d.getDay()]} ${d.getDate()} ${months[d.getMonth()]} ${d.getFullYear()}`;
  document.getElementById('hdrRank').textContent  = getRank();
  document.getElementById('hdrStreak').textContent = D.streak.cur;
  document.getElementById('hdrXP').textContent    = D.xp;
}

function updateDayBanner() {
  const el = document.getElementById('dayBanner');
  const statuses = ['nutrition','lecture','sport','devoirs'].map(k => D.domains[k].todayStatus);
  const done  = statuses.filter(s => s !== null).length;
  const allOk = statuses.every(s => s === 'reussi');
  const hasFail = statuses.includes('rate');
  const allDone = statuses.every(s => s !== null);

  if (allOk) { el.className='day-banner complete'; el.textContent='✦ Journée complète — Tous les serments honorés.'; }
  else if (allDone && !hasFail) { el.className='day-banner saved'; el.textContent='◎ Journée sauvée — Aucun serment raté.'; }
  else if (hasFail) { el.className='day-banner failed'; el.textContent='✗ Journée compromise — Un serment a été raté.'; }
  else if (done === 0) { el.className='day-banner pending'; el.textContent='Accomplis tes serments.'; }
  else { el.className='day-banner pending'; el.textContent=`${done}/4 serments complétés.`; }
}

// ─── Weekly graph ────────────────────────────────
function renderWeekly() {
  const today = todayStr();
  const d = new Date();
  const dow = d.getDay(); // 0=sun
  const mondayOffset = dow === 0 ? -6 : 1 - dow;
  const days = [];
  for (let i = 0; i < 7; i++) {
    const dd = new Date(d);
    dd.setDate(d.getDate() + mondayOffset + i);
    days.push(dd.toLocaleDateString('fr-CA'));
  }
  const lbls = ['Lun','Mar','Mer','Jeu','Ven','Sam','Dim'];
  const domains = ['nutrition','lecture','sport','devoirs'];
  const domIcons = ['🥗','📖','🏋️','📝'];

  function getDots(dateStr) {
    if (dateStr === today) return domains.map(k => D.domains[k].todayStatus || 'now');
    const entry = D.history.find(h => h.date === dateStr);
    if (!entry) return [null,null,null,null];
    return domains.map(k => entry[k] || null);
  }
  function dotClass(s) {
    if (!s) return 'wk-d';
    if (s === 'now') return 'wk-d now';
    if (s === 'reussi') return 'wk-d ok';
    if (s === 'minimum') return 'wk-d mn';
    if (s === 'rate') return 'wk-d fl';
    return 'wk-d';
  }

  // Desktop rows
  const rowsEl = document.getElementById('wkRows');
  rowsEl.innerHTML = '';
  days.forEach((dateStr, i) => {
    const dots = getDots(dateStr);
    const row = document.createElement('div');
    row.className = 'wk-row' + (dateStr === today ? ' today' : '');
    const lbl = document.createElement('div'); lbl.className='wk-lbl'; lbl.textContent=lbls[i];
    const dotsEl = document.createElement('div'); dotsEl.className='wk-dots';
    dots.forEach(s => { const dot=document.createElement('div'); dot.className=dotClass(s); dotsEl.appendChild(dot); });
    row.appendChild(lbl); row.appendChild(dotsEl);
    rowsEl.appendChild(row);
  });

  // Mobile columns
  const colsEl = document.getElementById('wkCols');
  colsEl.innerHTML = '';
  days.forEach((dateStr, i) => {
    const dots = getDots(dateStr);
    const col = document.createElement('div');
    col.className = 'wk-col' + (dateStr === today ? ' today' : '');
    const lbl = document.createElement('div'); lbl.className='wk-lbl'; lbl.textContent=lbls[i];
    const dotsDiv = document.createElement('div'); dotsDiv.className='wk-col-dots';
    dots.forEach(s => { const dot=document.createElement('div'); dot.className=dotClass(s); dotsDiv.appendChild(dot); });
    col.appendChild(lbl); col.appendChild(dotsDiv);
    colsEl.appendChild(col);
  });

  // Summary
  const weekReussi = D.history
    .filter(h => days.slice(0,-1).includes(h.date))
    .reduce((acc,h) => acc + ['nutrition','lecture','sport','devoirs'].filter(k=>h[k]==='reussi').length, 0);
  const todayReussi = domains.filter(k=>D.domains[k].todayStatus==='reussi').length;
  document.getElementById('wkSummary').innerHTML = `<b>${weekReussi + todayReussi}</b> serments honorés cette semaine`;
}

// ─── Nutrition ───────────────────────────────────
function renderNutrition() {
  const dm = D.domains.nutrition;
  const lv = NUTRITION_LEVELS[Math.min(dm.level-1, NUTRITION_LEVELS.length-1)];
  const snack = D.nutrition.snackTime || '09:00';
  const dinner = D.nutrition.dinnerTime || '18:45';
  const items = [
    { k:'petit', label:'Petit-déjeuner' },
    { k:'snack', label:`Snack — ${snack}` },
    { k:'midi',  label:'Repas de midi' },
    { k:'soir',  label:`Repas du soir — ${dinner}` },
  ];

  let html = cardHead('🍽', 'Nutrition', dm, lv.n);
  html += `<div class="dcard-body">`;
  html += `<div class="mission-desc">${lv.desc}</div>`;

  if (dm.todayStatus) {
    html += resultRow(dm.todayStatus, 'nutrition');
  } else {
    html += `<div class="cklist">`;
    items.forEach(it => {
      const checked = D.nutrition.checks[it.k];
      html += `<div class="ck-item${checked?' done':''}" onclick="toggleCheck('nutrition','${it.k}')">
        <div class="ck-box">${checked?'✓':''}</div>
        <div class="ck-txt">${it.label}</div>
      </div>`;
    });
    html += `</div>`;
    html += actionBtns('nutrition');
  }
  html += `</div>`;
  document.getElementById('card-nutrition').innerHTML = html;
  setCardClass('card-nutrition', dm.todayStatus);
}

// ─── Lecture ─────────────────────────────────────
function renderLecture() {
  const dm = D.domains.lecture;
  const lv = dm.level;
  const pages = LECTURE_PAGES[Math.min(lv-1, LECTURE_PAGES.length-1)];
  const note  = LECTURE_NOTES[Math.min(lv-1, LECTURE_NOTES.length-1)];
  const desc  = `Lire ${pages} pages${note?' '+note:''}.`;
  const pct = D.lecture.totalPages > 0 ? Math.round((D.lecture.currentPage / D.lecture.totalPages)*100) : 0;

  let html = cardHead('📖', 'Lecture', dm, `Niveau ${lv}`);
  html += `<div class="dcard-body">`;
  html += `<div class="mission-desc">${desc}</div>`;

  // Book fields
  html += `<div class="book-fields">
    <div class="bf-group"><span class="bf-lbl">Livre</span><input class="bf-inp wide" id="lec-book" value="${esc(D.lecture.bookName)}" placeholder="Titre du livre" onchange="updateBook()"/></div>
  </div>
  <div class="book-fields">
    <div class="bf-group"><span class="bf-lbl">Page actuelle</span><input class="bf-inp" id="lec-page" type="number" value="${D.lecture.currentPage}" min="0" onchange="updateBook()"/></div>
    <div class="bf-group"><span class="bf-lbl">Total</span><input class="bf-inp" id="lec-total" type="number" value="${D.lecture.totalPages}" min="0" onchange="updateBook()"/></div>
  </div>`;
  if (D.lecture.totalPages > 0) {
    html += `<div class="book-bar"><div class="book-bar-fill" style="width:${pct}%"></div></div>
    <div class="book-pct">${pct}% terminé — page ${D.lecture.currentPage}/${D.lecture.totalPages}</div>`;
  }

  if (dm.todayStatus) {
    html += resultRow(dm.todayStatus, 'lecture');
  } else {
    html += actionBtns('lecture');
  }
  html += `</div>`;
  document.getElementById('card-lecture').innerHTML = html;
  setCardClass('card-lecture', dm.todayStatus);
}

// ─── Sport ───────────────────────────────────────
function renderSport() {
  const dm   = D.domains.sport;
  const lv   = dm.level;
  const dayAB = dm.dayAB || 'A';
  const cfg  = getSportConfig(lv);
  const exs  = dayAB === 'A' ? SPORT_A : SPORT_B;
  const dayLabel = dayAB === 'A' ? 'Jour A — Haut du corps' : 'Jour B — Bas du corps & Abdos';

  function getSetRep(ex) {
    if (ex.specialKey === 'gainage')  return `${cfg.gSets} × ${cfg.gainage}`;
    if (ex.specialKey === 'mollets')  return `${cfg.mSets} × ${cfg.mollets} reps`;
    if (ex.specialKey === 'crunch')   return `${cfg.cSets} × ${cfg.crunch} reps`;
    return `${cfg.sets} × ${cfg.reps} reps${ex.note?' '+ex.note:''}`;
  }

  let html = cardHead('🏋️', 'Sport', dm, `Niveau ${lv}`);
  html += `<div class="dcard-body">`;
  html += `<span class="sport-badge">${dayLabel}</span>`;

  if (dm.todayStatus) {
    html += resultRow(dm.todayStatus, 'sport');
  } else {
    html += `<div class="ex-list">`;
    exs.forEach((ex, i) => {
      const ck = !!D.sport.checks[`${dayAB}_${i}`];
      html += `<div class="ex-item${ck?' done':''}" onclick="toggleExercise('${dayAB}',${i})">
        <span class="ex-name">${ex.name}</span>
        <div style="display:flex;align-items:center;gap:8px;">
          <span class="ex-sets">${getSetRep(ex)}</span>
          <span class="ex-ck">${ck?'✓':'○'}</span>
        </div>
      </div>`;
    });
    html += `</div>`;
    html += actionBtns('sport');
  }
  html += `</div>`;
  document.getElementById('card-sport').innerHTML = html;
  setCardClass('card-sport', dm.todayStatus);
}

// ─── Devoirs ─────────────────────────────────────
function renderDevoirs() {
  const dm  = D.domains.devoirs;
  const lv  = dm.level;
  const desc = DEVOIRS_LEVELS[Math.min(lv-1, DEVOIRS_LEVELS.length-1)];

  let html = cardHead('📝', 'Devoirs', dm, `Niveau ${lv}`);
  html += `<div class="dcard-body">`;
  html += `<div class="mission-desc">${desc}</div>`;

  if (dm.todayStatus) {
    if (D.devoirs.taskName) {
      html += `<div style="font-size:12px;color:var(--txt2);margin-bottom:10px;">📌 ${esc(D.devoirs.taskName)}</div>`;
    }
    html += resultRow(dm.todayStatus, 'devoirs');
  } else {
    html += `<input class="dv-inp" id="dv-task" value="${esc(D.devoirs.taskName)}" placeholder="Quel devoir dois-tu terminer aujourd'hui ?" onchange="D.devoirs.taskName=this.value;save()"/>`;
    html += actionBtns('devoirs');
  }
  html += `</div>`;
  document.getElementById('card-devoirs').innerHTML = html;
  setCardClass('card-devoirs', dm.todayStatus);
}

// ─── HTML helpers ────────────────────────────────
function cardHead(icon, name, dm, subtitle) {
  const prog = dm.progress; const max = 3;
  let dots = '';
  for (let i=0;i<max;i++) dots += `<div class="pdot${i<prog?' on':''}"></div>`;
  return `<div class="dcard-hdr">
    <div class="dcard-left">
      <div class="dcard-icon">${icon}</div>
      <div><div class="dcard-nm">${name}</div><div class="dcard-lv">${subtitle}</div></div>
    </div>
    <div class="prog-dots">${dots}<span class="prog-frac">${prog}/3</span></div>
  </div>`;
}

function actionBtns(domain) {
  return `<div class="act-btns">
    <button class="act-btn btn-ok"  onclick="setResult('${domain}','reussi')">✓ Réussi</button>
    <button class="act-btn btn-mn"  onclick="setResult('${domain}','minimum')">◎ Minimum</button>
    <button class="act-btn btn-fl"  onclick="setResult('${domain}','rate')">✗ Raté</button>
  </div>`;
}

function resultRow(status, domain) {
  const labels = { reussi:'✓ Réussi', minimum:'◎ Minimum fait', rate:'✗ Raté' };
  const cls    = { reussi:'ok', minimum:'mn', rate:'fl' }[status];
  return `<div class="result-row ${cls}">
    <span>${labels[status]}</span>
    <button class="edit-btn" onclick="undoResult('${domain}')">Modifier</button>
  </div>`;
}

function setCardClass(id, status) {
  const el = document.getElementById(id);
  el.className = 'dcard' + (status==='reussi'?' s-ok':status==='minimum'?' s-mn':status==='rate'?' s-fl':'');
}

function esc(s) { return (s||'').replace(/"/g,'&quot;').replace(/</g,'&lt;'); }

// ─── Check toggles ───────────────────────────────
function toggleCheck(domain, key) {
  if (D.domains[domain].todayStatus) return;
  if (domain === 'nutrition') { D.nutrition.checks[key] = !D.nutrition.checks[key]; save(); renderNutrition(); }
}
function toggleExercise(day, idx) {
  const dm = D.domains.sport;
  if (dm.todayStatus) return;
  const k = `${day}_${idx}`;
  D.sport.checks[k] = !D.sport.checks[k];
  save(); renderSport();
}
function updateBook() {
  const name = document.getElementById('lec-book'); if (name) D.lecture.bookName = name.value;
  const pg   = document.getElementById('lec-page'); if (pg)   D.lecture.currentPage = parseInt(pg.value)||0;
  const tot  = document.getElementById('lec-total'); if (tot)  D.lecture.totalPages  = parseInt(tot.value)||0;
  save(); renderLecture();
}

// ═══════════════════════════════════════════════
//  SETTINGS
// ═══════════════════════════════════════════════
function openSettings() {
  document.getElementById('sov').classList.add('open');
  document.getElementById('sBookName').value    = D.lecture.bookName || '';
  document.getElementById('sBookCurrent').value = D.lecture.currentPage || 0;
  document.getElementById('sBookTotal').value   = D.lecture.totalPages || 0;
  document.getElementById('sSnack').value       = D.nutrition.snackTime || '09:00';
  document.getElementById('sDinner').value      = D.nutrition.dinnerTime || '18:45';
  const tok = localStorage.getItem('gh_token')||'';
  document.getElementById('sToken').value = tok ? '••••••••••••••••' : '';
  if (tok) setSync('Token configuré', true);
  else setSync('Aucun token — sync désactivée', false, true);
}
function closeSettings() { document.getElementById('sov').classList.remove('open'); }
function saveSettings() {
  D.lecture.bookName    = document.getElementById('sBookName').value;
  D.lecture.currentPage = parseInt(document.getElementById('sBookCurrent').value)||0;
  D.lecture.totalPages  = parseInt(document.getElementById('sBookTotal').value)||0;
  D.nutrition.snackTime  = document.getElementById('sSnack').value;
  D.nutrition.dinnerTime = document.getElementById('sDinner').value;
  const tok = document.getElementById('sToken').value;
  if (tok && !tok.includes('•')) localStorage.setItem('gh_token', tok);
  save(); closeSettings(); renderAll();
  toast('Paramètres enregistrés');
}
function resetDomain() {
  const d = prompt('Quel domaine réinitialiser ? (nutrition / lecture / sport / devoirs)');
  if (!d || !D.domains[d]) return;
  if (!confirm(`Réinitialiser ${d} complètement ?`)) return;
  D.domains[d] = { level:1, progress:0, todayStatus:null };
  if (d === 'sport') D.domains.sport.dayAB = 'A';
  save(); renderAll(); toast('Domaine réinitialisé');
}

// ═══════════════════════════════════════════════
//  TOAST
// ═══════════════════════════════════════════════
function toast(msg, type) {
  const c = document.getElementById('toasts');
  const el = document.createElement('div');
  el.className = 'toast' + (type==='red'?' red':type==='green'?' green':'');
  el.textContent = msg;
  c.appendChild(el);
  setTimeout(()=>el.remove(), 3200);
}

// Close settings on overlay click
document.getElementById('sov').addEventListener('click', e => {
  if (e.target === document.getElementById('sov')) closeSettings();
});

// ═══════════════════════════════════════════════
checkDailyReset();
renderAll();
// Try sync from GitHub on load
if (getToken()) syncFromGitHub().catch(()=>{});
